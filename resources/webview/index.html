<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src {{CSP_SOURCE}} 'unsafe-inline'; script-src 'nonce-{{NONCE}}'; img-src {{CSP_SOURCE}} data:; font-src {{CSP_SOURCE}};" />
  <title>CC Panel</title>
  <link rel="stylesheet" href="{{STYLES_URI}}" />
</head>
<body data-active="1">
  <div id="frame" class="frame frame-t1">

    <!-- AUTO-ACCEPT BANNER: widoczny tylko gdy sesja aktywna -->
    <div id="aa-banner" class="aa-banner" hidden>
      <span class="aa-banner-dot"></span>
      <span class="aa-banner-label">AA</span>
      <span id="aa-banner-term" class="aa-banner-term">T?</span>
      <span class="aa-banner-sep">·</span>
      <span id="aa-banner-iter" class="aa-banner-metric">iter —</span>
      <span class="aa-banner-sep">·</span>
      <span id="aa-banner-cost" class="aa-banner-metric">$—</span>
      <span class="aa-banner-sep">·</span>
      <span id="aa-banner-time" class="aa-banner-metric">time —</span>
      <span class="aa-banner-spacer"></span>
      <button id="aa-banner-stop" class="btn btn-key aa-banner-stop" type="button" title="Zatrzymaj Auto-Accept">Stop</button>
    </div>

    <!-- WIERSZ 2: terminal chips — tylko aktywne terminale widoczne -->
    <div class="bar bar-terms">
      <div class="chip-group chip-group-terms" id="grp-term" role="radiogroup" aria-label="Terminal">
        <button class="chip chip-t chip-term-wide chip-t1 is-active"  data-id="1" type="button">
          <span class="chip-term-id">T1</span>
          <span class="chip-term-sep">·</span>
          <span class="chip-term-folder" data-id="1"></span>
          <span class="chip-wait-timer" data-id="1" hidden></span>
          <span class="chip-term-sep chip-term-sep-metrics">·</span>
          <span class="chip-term-cost" data-metric="cost">—</span>
          <span class="chip-term-sep">·</span>
          <span class="chip-term-tokens" data-metric="total">—</span>
          <span class="chip-term-sep">·</span>
          <span class="chip-term-ctx" data-metric="ctx">—</span>
        </button>
        <button class="chip chip-t chip-term-wide chip-t2" data-id="2" type="button" hidden>
          <span class="chip-term-id">T2</span>
          <span class="chip-term-sep">·</span>
          <span class="chip-term-folder" data-id="2"></span>
          <span class="chip-wait-timer" data-id="2" hidden></span>
          <span class="chip-term-sep chip-term-sep-metrics">·</span>
          <span class="chip-term-cost" data-metric="cost">—</span>
          <span class="chip-term-sep">·</span>
          <span class="chip-term-tokens" data-metric="total">—</span>
          <span class="chip-term-sep">·</span>
          <span class="chip-term-ctx" data-metric="ctx">—</span>
        </button>
        <button class="chip chip-t chip-term-wide chip-t3" data-id="3" type="button" hidden>
          <span class="chip-term-id">T3</span>
          <span class="chip-term-sep">·</span>
          <span class="chip-term-folder" data-id="3"></span>
          <span class="chip-wait-timer" data-id="3" hidden></span>
          <span class="chip-term-sep chip-term-sep-metrics">·</span>
          <span class="chip-term-cost" data-metric="cost">—</span>
          <span class="chip-term-sep">·</span>
          <span class="chip-term-tokens" data-metric="total">—</span>
          <span class="chip-term-sep">·</span>
          <span class="chip-term-ctx" data-metric="ctx">—</span>
        </button>
        <button class="chip chip-t chip-term-wide chip-t4" data-id="4" type="button" hidden>
          <span class="chip-term-id">T4</span>
          <span class="chip-term-sep">·</span>
          <span class="chip-term-folder" data-id="4"></span>
          <span class="chip-wait-timer" data-id="4" hidden></span>
          <span class="chip-term-sep chip-term-sep-metrics">·</span>
          <span class="chip-term-cost" data-metric="cost">—</span>
          <span class="chip-term-sep">·</span>
          <span class="chip-term-tokens" data-metric="total">—</span>
          <span class="chip-term-sep">·</span>
          <span class="chip-term-ctx" data-metric="ctx">—</span>
        </button>
      </div>
    </div>

  </div>

  <script nonce="{{NONCE}}" src="{{MAIN_URI}}"></script>
</body>
</html>
