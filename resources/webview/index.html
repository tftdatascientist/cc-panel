<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src {{CSP_SOURCE}} 'unsafe-inline'; script-src 'nonce-{{NONCE}}'; img-src {{CSP_SOURCE}} data:; font-src {{CSP_SOURCE}};" />
  <title>CC Panel</title>
  <link rel="stylesheet" href="{{STYLES_URI}}" />
</head>
<body data-active="1">
  <div id="frame" class="frame frame-t1">

    <!-- WIERSZ 1: input + send + keystrokes + toggle dashboard -->
    <div class="bar bar-top">
      <input id="input-text" class="input-line" type="text"
        list="cmd-list"
        placeholder="Wpisz lub wybierz komendę — Enter wysyła"
        autocomplete="off" spellcheck="false" />
      <datalist id="cmd-list"></datalist>
      <button id="btn-send"  class="btn btn-primary" type="button">▶</button>

      <div class="sep"></div>

      <button id="btn-esc"   class="btn btn-key" type="button">Esc</button>
      <button id="btn-ctrlc" class="btn btn-key" type="button">^C</button>

      <div class="sep"></div>

      <button id="btn-dash"  class="btn btn-key" type="button" title="Zwiń/rozwiń dashboard">▼</button>
    </div>

    <!-- WIERSZ 2: terminal chips z Ctx% -->
    <div class="bar bar-terms">
      <div class="chip-group chip-group-terms" id="grp-term" role="radiogroup" aria-label="Terminal">
        <button class="chip chip-t chip-term-wide chip-t1 is-active"  data-id="1" type="button">
          <span class="chip-term-id">T1</span><span class="chip-term-ctx" data-metric="ctx">—</span>
        </button>
        <button class="chip chip-t chip-term-wide chip-t2 is-disabled" data-id="2" type="button">
          <span class="chip-term-id">T2</span><span class="chip-term-ctx" data-metric="ctx">—</span>
        </button>
        <button class="chip chip-t chip-term-wide chip-t3 is-disabled" data-id="3" type="button">
          <span class="chip-term-id">T3</span><span class="chip-term-ctx" data-metric="ctx">—</span>
        </button>
        <button class="chip chip-t chip-term-wide chip-t4 is-disabled" data-id="4" type="button">
          <span class="chip-term-id">T4</span><span class="chip-term-ctx" data-metric="ctx">—</span>
        </button>
      </div>
    </div>

    <!-- DASHBOARD: Cost/Total per terminal + last message aktywnego -->
    <section id="dashboard" class="dashboard">
      <table class="dash-table" aria-label="Metryki terminali">
        <tbody>
          <tr>
            <td class="dash-cell" data-id="1" data-metric="cost">—</td>
            <td class="dash-cell" data-id="2" data-metric="cost">—</td>
            <td class="dash-cell" data-id="3" data-metric="cost">—</td>
            <td class="dash-cell" data-id="4" data-metric="cost">—</td>
          </tr>
          <tr>
            <td class="dash-cell" data-id="1" data-metric="total">—</td>
            <td class="dash-cell" data-id="2" data-metric="total">—</td>
            <td class="dash-cell" data-id="3" data-metric="total">—</td>
            <td class="dash-cell" data-id="4" data-metric="total">—</td>
          </tr>
        </tbody>
      </table>

      <div class="last-message-wrap">
        <div class="last-message-hdr">
          <span class="last-message-title">💬 Ostatnia wiadomość</span>
          <span class="last-message-meta" id="last-msg-meta"></span>
        </div>
        <div class="last-message-body" id="last-msg-body">—</div>
      </div>
    </section>

  </div>

  <script nonce="{{NONCE}}" src="{{MAIN_URI}}"></script>
</body>
</html>
