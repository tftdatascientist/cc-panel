<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src {{CSP_SOURCE}} 'unsafe-inline'; script-src 'nonce-{{NONCE}}'; img-src {{CSP_SOURCE}} data:; font-src {{CSP_SOURCE}};" />
  <title>CC Panel</title>
  <link rel="stylesheet" href="{{STYLES_URI}}" />
</head>
<body data-active="1">
  <div id="frame" class="frame frame-t1">

    <!-- GÓRNY PASEK: input + wszystkie kontrolki w jednej linii -->
    <div class="bar">

      <!-- INPUT — 20-25% szerokości, pełna wysokość baru -->
      <input id="input-text" class="input-line" type="text"
        placeholder="Wpisz i naciśnij Enter…" autocomplete="off" spellcheck="false" />

      <!-- DROPDOWN — treść zależy od wybranego trybu -->
      <select id="sel-main" class="sel-main"></select>
      <button id="btn-send" class="btn btn-primary" type="button">▶</button>

      <div class="sep"></div>

      <!-- TYP: cmd / user / text / input -->
      <div class="chip-group" id="grp-mode" role="radiogroup" aria-label="Typ">
        <button class="chip chip-mode is-active" data-mode="cmd"   type="button">cmd</button>
        <button class="chip chip-mode"           data-mode="user"  type="button">user</button>
        <button class="chip chip-mode"           data-mode="text"  type="button">text</button>
        <button class="chip chip-mode"           data-mode="input" type="button">input</button>
      </div>

      <div class="sep"></div>

      <!-- TERMINAL: 1 2 3 4 (kolorowe, bez podpisów) -->
      <div class="chip-group" id="grp-term" role="radiogroup" aria-label="Terminal">
        <button class="chip chip-t chip-t1 is-active" data-id="1" type="button">1</button>
        <button class="chip chip-t chip-t2 is-disabled" data-id="2" type="button">2</button>
        <button class="chip chip-t chip-t3 is-disabled" data-id="3" type="button">3</button>
        <button class="chip chip-t chip-t4 is-disabled" data-id="4" type="button">4</button>
      </div>

      <div class="sep"></div>

      <!-- MODEL -->
      <select id="sel-model" class="sel-sm" title="Model">
        <option value="">default</option>
        <option value="opus">opus</option>
        <option value="sonnet">sonnet</option>
        <option value="haiku">haiku</option>
      </select>

      <!-- EFFORT -->
      <select id="sel-effort" class="sel-sm" title="Effort">
        <option value="">effort</option>
        <option value="low">low</option>
        <option value="mid">mid</option>
        <option value="hard">hard</option>
        <option value="max">max</option>
      </select>

      <!-- THINK -->
      <select id="sel-think" class="sel-sm" title="Think">
        <option value="">think</option>
        <option value="think">think</option>
        <option value="think harder">think harder</option>
      </select>

      <!-- PLAN -->
      <label class="chip" title="Plan mode (⇧Tab×2)">
        <input type="checkbox" id="cb-plan" />plan
      </label>

      <div class="sep"></div>

      <!-- KEYSTROKES -->
      <button id="btn-esc"      class="btn btn-key" type="button">Esc</button>
      <button id="btn-ctrlc"    class="btn btn-key" type="button">^C</button>
      <button id="btn-shifttab" class="btn btn-key" type="button">⇧Tab</button>

    </div>
    <!-- koniec .bar -->

  </div>

  <script nonce="{{NONCE}}" src="{{MAIN_URI}}"></script>
</body>
</html>
